name: PeakTimeMonitor
options:
  bundleIdPrefix: com.gael.peaktime
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: Manual

targets:
  PeakTimeMonitor:
    type: application
    platform: macOS
    sources:
      - path: PeakTimeMonitorApp
    settings:
      base:
        INFOPLIST_FILE: PeakTimeMonitorApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gael.peaktime
        PRODUCT_NAME: PeakTimeMonitor
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    entitlements:
      path: PeakTimeMonitorApp/PeakTimeMonitor.entitlements
    dependencies:
      - target: PeakTimeWidget

  PeakTimeWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: PeakTimeWidgetExtension
    settings:
      base:
        INFOPLIST_FILE: PeakTimeWidgetExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gael.peaktime.widget
        PRODUCT_NAME: PeakTimeWidget
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        INFOPLIST_KEY_CFBundleDisplayName: "Peak Time"
    entitlements:
      path: PeakTimeWidgetExtension/PeakTimeWidget.entitlements
